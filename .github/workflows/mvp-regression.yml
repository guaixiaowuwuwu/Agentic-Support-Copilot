name: MVP Regression

on:
  push:
    branches:
      - main
      - v0.1-mvp
  pull_request:
  workflow_dispatch:

jobs:
  api-tests:
    name: API unittest
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install API dependencies
        run: |
          python3 -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -r apps/api/requirements.txt

      - name: Run API regression tests
        run: .venv/bin/python -m unittest discover -s apps/api/tests

  web-build:
    name: Web production build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install web dependencies
        run: npm ci

      - name: Run Next.js production build
        run: npm --workspace apps/web run build

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install API dependencies
        run: |
          python3 -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -r apps/api/requirements.txt

      - name: Install web dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run 401 workflow E2E
        run: npm run test:e2e

  postgres-integration:
    name: PostgreSQL integration
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: support_copilot
          POSTGRES_USER: support
          POSTGRES_PASSWORD: support
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U support -d support_copilot"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install API dependencies
        run: |
          python3 -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -r apps/api/requirements.txt

      - name: Run PostgreSQL persistence regression tests
        run: |
          SUPPORT_COPILOT_TEST_DATABASE_URL=postgresql://support:support@127.0.0.1:5432/support_copilot \
            .venv/bin/python -m unittest apps/api/tests/test_postgres_store.py
